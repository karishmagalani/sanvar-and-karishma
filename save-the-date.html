<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save the Date — Sanvar & Karishma</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Josefin+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #d6d3cc;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      width: 1050px;
      height: 1470px;
      background: #fff;
      position: relative;
      overflow: hidden;
      box-shadow: 0 12px 60px rgba(0,0,0,0.13);
    }

    /* ---- marigold illustrations ---- */
    .mg {
      position: absolute;
      pointer-events: none;
    }
    .mg img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* top-right: large, peeks behind "SAVE" */
    .mg-a {
      width: 170px;
      top: 50px;
      right: 85px;
      transform: rotate(12deg);
      opacity: 0.9;
    }
    /* left of "the": small accent */
    .mg-b {
      width: 90px;
      top: 410px;
      left: 95px;
      transform: rotate(-20deg);
      opacity: 0.8;
    }
    /* right of "DATE": large */
    .mg-c {
      width: 155px;
      top: 560px;
      right: 55px;
      transform: rotate(25deg) scaleX(-1);
      opacity: 0.85;
    }
    /* left side mid — near details */
    .mg-d {
      width: 110px;
      top: 870px;
      left: 70px;
      transform: rotate(-10deg);
      opacity: 0.75;
    }
    /* bottom-right: small */
    .mg-e {
      width: 80px;
      bottom: 100px;
      right: 100px;
      transform: rotate(30deg);
      opacity: 0.65;
    }
    /* tiny accent near date */
    .mg-f {
      width: 55px;
      top: 1020px;
      right: 280px;
      transform: rotate(-35deg) scaleX(-1);
      opacity: 0.5;
    }

    /* ---- typography ---- */
    .headline {
      position: absolute;
      top: 95px;
      left: 100px;
      z-index: 2;
    }

    .headline .word {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700;
      font-size: 180px;
      line-height: 0.88;
      letter-spacing: -0.02em;
      color: #1a1714;
      text-transform: uppercase;
    }

    .headline .word-the {
      font-size: 100px;
      font-weight: 300;
      font-style: italic;
      text-transform: lowercase;
      letter-spacing: 0.12em;
      color: #1a1714;
      margin-left: 12px;
      line-height: 1.3;
    }

    /* ---- details block (right-aligned like example) ---- */
    .info {
      position: absolute;
      right: 100px;
      top: 830px;
      text-align: right;
      z-index: 2;
    }

    .info-names {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 52px;
      color: #1a1714;
      line-height: 1.05;
      letter-spacing: 0.02em;
    }

    .info-amp {
      font-style: italic;
      font-size: 32px;
      color: #c4a265;
      margin: 0 6px;
    }

    .info-line {
      width: 45px;
      height: 1px;
      background: #c4a265;
      margin: 22px 0 22px auto;
    }

    .info-date {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 300;
      font-size: 14px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #1a1714;
    }

    .info-location {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 300;
      font-size: 10.5px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #8a8480;
      margin-top: 12px;
    }

    .info-venue {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: 24px;
      color: #6b6360;
      margin-top: 4px;
      letter-spacing: 0.03em;
    }

    /* ---- small photo — optional editorial touch ---- */
    .photo-small {
      position: absolute;
      left: 100px;
      bottom: 130px;
      width: 220px;
      height: 280px;
      overflow: hidden;
      z-index: 2;
    }
    .photo-small img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 15%;
      display: block;
      filter: grayscale(15%);
    }

    /* ---- families line at bottom ---- */
    .families {
      position: absolute;
      bottom: 55px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 300;
      font-size: 9px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #c4a265;
      z-index: 2;
    }

    @media print {
      html, body { background: #fff; }
      .card { box-shadow: none; }
    }
  </style>
</head>
<body>

<div class="card">

  <!-- marigold illustrations scattered around the text -->
  <div class="mg mg-a"><img src="photos/marigolds/marigold-1.png" alt=""></div>
  <div class="mg mg-b"><img src="photos/marigolds/marigold-5.png" alt=""></div>
  <div class="mg mg-c"><img src="photos/marigolds/marigold-2.png" alt=""></div>
  <div class="mg mg-d"><img src="photos/marigolds/marigold-3.png" alt=""></div>
  <div class="mg mg-e"><img src="photos/marigolds/marigold-4.png" alt=""></div>
  <div class="mg mg-f"><img src="photos/marigolds/marigold-5.png" alt=""></div>

  <!-- large stacked headline — like "WE'RE GETTING MARRIED" -->
  <div class="headline">
    <span class="word">Save</span>
    <span class="word word-the">the</span>
    <span class="word">Date</span>
  </div>

  <!-- details block — right side, like the example -->
  <div class="info">
    <p class="info-names">Sanvar <span class="info-amp">&</span> Karishma</p>
    <div class="info-line"></div>
    <p class="info-date">April 18 &mdash; 20, 2026</p>
    <p class="info-location">Rishikesh, India</p>
    <p class="info-venue">Anand Kashi</p>
  </div>

  <!-- small editorial photo, bottom-left -->
  <div class="photo-small">
    <img src="photos/Karishma and Sanvar-07.jpg" alt="Sanvar & Karishma">
  </div>

  <!-- families -->
  <p class="families">The Oberois & Galanis</p>

</div>

</body>
</html>
